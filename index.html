<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Page</title>

    <!-- Link to CSS -->
    <link rel="stylesheet" href="styles/main.css">

    <!-- Link to JavaScript -->
    <script src="scripts/form-validation.js" defer></script>
</head>

<body>

<header>
    <h1>My Contact Page</h1>
</header>

<nav>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<main>
    <h2>Contact Form</h2>

    <form id="contact-form">

        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" class="required">

        <label for="email">Email:</label>
        <input type="email" id="email" class="required">

        <label for="reason">Reason for Contact:</label>
        <select id="reason" class="required">
            <option value="">--Select an Option--</option>
            <option value="question">Question</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
        </select>

        <input type="button" value="Submit" id="submit-btn">

    </form>

    <span id="missing-count"></span>

</main>

<footer>
    <p>&copy; 2026 My Website</p>
</footer>

</body>
</html>
